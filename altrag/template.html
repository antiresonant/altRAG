<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>altRAG Skill Tree</title>
<script>
// early theme — runs before paint to prevent flash
(function(){var t=localStorage.getItem('altrag-theme');
if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches))
document.documentElement.classList.add('dark')})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf8f5;--sf:#efebe5;--sf2:#e4e0d8;--bd:#c8c2b8;
  --tx:#000;--dm:#8a8478;--ln:#000;--ac:#000;
  --gn:#2d6a2e;--rd:#a82828;
  --d1:#000;--d2:#000;--d3:#000;--d4:#000;--d5:#000;--d6:#000;
  --sh:0 2px 16px rgba(0,0,0,.07);
}
:root.dark{
  --bg:#080808;--sf:#131313;--sf2:#1c1c1c;--bd:#2a2a2a;
  --tx:#f0ebe3;--dm:#6b665e;--ln:#f0ebe3;--ac:#f0ebe3;
  --gn:#6bc46b;--rd:#e87070;
  --d1:#f0ebe3;--d2:#f0ebe3;--d3:#f0ebe3;--d4:#f0ebe3;--d5:#f0ebe3;--d6:#f0ebe3;
  --sh:0 2px 16px rgba(0,0,0,.4);
}
body{font-family:Georgia,'Palatino Linotype','Book Antiqua',Palatino,serif;
  background:var(--bg);color:var(--tx);font-size:13px;line-height:1.4;transition:background .2s,color .2s}
header,header *,.btn,.sg-top,.sg-label,.sg-btns,.fr,.ib,#info{font-family:system-ui,-apple-system,'Segoe UI',sans-serif}
.d-cmd,.meta{font-family:'SF Mono','Fira Code','Cascadia Code',monospace}

header{display:flex;justify-content:space-between;align-items:center;
  padding:8px 20px;border-bottom:1px solid var(--bd);background:var(--sf)}
.h-left{display:flex;align-items:baseline;gap:10px}
.h-center{position:absolute;left:50%;transform:translateX(-50%)}
.h-center h1{font-size:14px;font-weight:700;letter-spacing:-.5px}
.h-center h1 em{font-style:normal;color:var(--dm);font-weight:400}
.stats{font-size:10px;color:var(--dm)}
.h-right{display:flex;gap:5px;align-items:center}
.h-right input{background:var(--bg);border:1px solid var(--bd);color:var(--tx);
  padding:4px 8px;border-radius:3px;font-size:11px;width:170px;font-family:inherit}
.h-right input:focus{outline:none;border-color:var(--tx)}
.btn{background:var(--bg);border:1px solid var(--bd);color:var(--dm);
  padding:3px 8px;border-radius:3px;cursor:pointer;font-size:10px;font-family:inherit}
.btn:hover{color:var(--tx);border-color:var(--tx)}
.btn-theme{font-size:13px;padding:2px 6px;line-height:1}

#tree-panel{overflow:auto;height:calc(100vh - 41px);padding:24px 24px 160px}

.file-sec{margin-bottom:100px;overflow-x:auto}
.file-lbl{font-size:12px;font-weight:800;color:var(--ac);text-transform:uppercase;
  letter-spacing:1.5px;text-align:center;margin-bottom:12px;
  text-decoration:underline;text-underline-offset:4px;text-decoration-thickness:2px}
:root{--ac:#1a4eab}:root.dark{--ac:#6b9ff7}
#file-picker{background:var(--bg);border:1px solid var(--bd);color:var(--tx);
  padding:3px 6px;border-radius:3px;font-size:10px;font-family:system-ui,sans-serif;cursor:pointer}
#file-picker:focus{outline:none;border-color:var(--tx)}

/* ══════ VERTICAL TREE ══════ */
.vt,.vt ul{list-style:none;margin:0;padding:0}
.vt{display:flex;justify-content:center}
.vt ul{display:flex;justify-content:center;padding-top:24px;position:relative}
/* vertical stem from parent node down to children row */
.vt ul::before{content:'';position:absolute;top:0;left:50%;height:24px;border-left:2px solid var(--ln)}
.vt li{display:flex;flex-direction:column;align-items:center;position:relative;padding:24px 5px 0}
/* vertical drop from horizontal bar down to this node */
.vt li::after{content:'';position:absolute;top:0;left:50%;width:0;height:24px;border-left:2px solid var(--ln)}
.vt li::before{display:none}
.vt>li{padding-top:0}
.vt>li::after{display:none}
.vt>li+li{margin-left:12px}
.vt li.shut>ul{display:none}
/* JS-computed horizontal bar: precise first-child-center to last-child-center */
.hbar{position:absolute;top:0;height:0;border-top:2px solid var(--ln);pointer-events:none}

/* node cards */
.node{display:inline-flex;align-items:center;gap:5px;
  padding:3px 6px;border:none;border-radius:0;
  background:transparent;cursor:pointer;white-space:nowrap;font-size:13px;
  transition:background .1s}
.node:hover{background:var(--ac);border-radius:3px}
.node:hover .lbl{color:var(--bg)}
.node.sel{}
.node.sh{background:var(--sf2);border-radius:3px}
.node.hr-n .lbl{color:var(--dm);letter-spacing:3px;font-size:10px}
.node .lbl{color:var(--tx);font-weight:600}
.node .meta{color:var(--dm);font-size:10px}
.node .tog{color:var(--dm);font-size:8px;margin-left:1px}

/* ══════ FLOATING DETAIL CARD ══════ */
#detail-card{position:fixed;bottom:16px;left:16px;width:320px;z-index:10;
  display:none;background:var(--sf);border:1px solid var(--bd);
  border-radius:8px;box-shadow:var(--sh);padding:12px 14px}
#detail-card.vis{display:block}
.dc-top{display:flex;justify-content:space-between;align-items:start;margin-bottom:4px}
.dc-close{background:none;border:none;color:var(--dm);cursor:pointer;font-size:16px;line-height:1;padding:0}
.dc-close:hover{color:var(--rd)}
.d-title{font-size:13px;font-weight:700;line-height:1.3}
.d-row{display:flex;justify-content:space-between;padding:2px 0;font-size:10px}
.d-row .l{color:var(--dm)} .d-row .v{font-weight:500}
.d-cmd{background:var(--bg);border:1px solid var(--bd);border-radius:3px;
  padding:5px 7px;margin-top:6px;font-size:10px;cursor:pointer;position:relative;
  word-break:break-all;line-height:1.4}
.d-cmd:hover{border-color:var(--tx)}
.d-cmd .cp{position:absolute;right:4px;top:4px;font-size:8px;color:var(--dm)}
.d-cmd.copied .cp{color:var(--gn)}

/* ══════ SUGGESTION CARD (draggable, minimizable) ══════ */
#sg-card{position:fixed;bottom:16px;right:16px;width:320px;z-index:11;
  background:var(--sf);border:1px solid var(--bd);border-radius:8px;
  box-shadow:var(--sh);overflow:hidden}
.sg-top{display:flex;justify-content:space-between;align-items:center;
  padding:8px 10px;cursor:grab;user-select:none;border-bottom:1px solid transparent}
.sg-top.dragging{cursor:grabbing}
#sg-card:not(.minimized) .sg-top{border-bottom-color:var(--bd)}
.sg-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--dm);
  display:flex;align-items:center;gap:4px}
.sg-btns{display:flex;gap:3px;align-items:center}
.sg-btns button{background:none;border:1px solid var(--bd);color:var(--dm);
  padding:1px 5px;border-radius:2px;font-size:9px;cursor:pointer;font-family:inherit}
.sg-btns button:hover{color:var(--tx);border-color:var(--tx)}
.sg-btns .exp{border-color:var(--gn);color:var(--gn)}
.sg-min{font-size:14px;border:none !important;padding:0 3px !important;line-height:1}
#sg-body{padding:8px 10px 10px}
#sg-card.minimized #sg-body{display:none}
#sg-card.minimized .sg-top{border-bottom-color:transparent}
#sg-card.minimized{width:auto}

.ib{background:none;border:1px solid var(--bd);color:var(--dm);width:14px;height:14px;
  border-radius:50%;font-size:8px;cursor:pointer;display:inline-flex;align-items:center;
  justify-content:center;font-family:serif;font-style:italic}
.ib:hover{color:var(--tx);border-color:var(--tx)}
#info{background:var(--bg);border:1px solid var(--bd);border-radius:3px;
  padding:6px;margin-bottom:6px;font-size:9px;line-height:1.5;display:none}
#info.vis{display:block}
#info b{color:var(--tx);font-weight:600;display:block;margin-bottom:2px}
#info li{color:var(--dm);margin-left:12px;margin-bottom:1px;list-style:disc}
#sg-form textarea{width:100%;background:var(--bg);border:1px solid var(--bd);color:var(--tx);
  padding:5px 7px;border-radius:3px;resize:vertical;min-height:38px;font-family:inherit;font-size:11px}
#sg-form textarea:focus{outline:none;border-color:var(--tx)}
.fr{display:flex;gap:4px;margin-top:4px}
.fr select{flex:1;background:var(--bg);border:1px solid var(--bd);color:var(--tx);
  padding:3px;border-radius:3px;font-family:inherit;font-size:10px}
.fr .sub{background:var(--tx);border:none;color:var(--bg);padding:3px 10px;
  border-radius:3px;cursor:pointer;font-weight:700;font-family:inherit;font-size:10px}
.fr .sub:hover{opacity:.8}
#sg-list{margin-top:6px;max-height:120px;overflow-y:auto}
.si{background:var(--bg);border:1px solid var(--bd);border-radius:3px;
  padding:4px 20px 4px 5px;margin-bottom:3px;font-size:9px;position:relative}
.si .sm{color:var(--dm);margin-bottom:1px;display:flex;gap:5px;align-items:center}
.si .sc{background:var(--sf2);padding:0 3px;border-radius:2px;font-size:8px}
.si .st{color:var(--tx);line-height:1.3;white-space:pre-wrap}
.si .sx{position:absolute;top:3px;right:5px;background:none;border:none;
  color:var(--dm);cursor:pointer;font-size:12px;line-height:1}
.si .sx:hover{color:var(--rd)}
</style>
</head>
<body>

<header>
  <div class="h-left">
    <span class="stats">__TOTAL_FILES__ files &middot; __TOTAL_SECTIONS__ sections</span>
  </div>
  <div class="h-center">
    <h1>altRAG <em>Interactive Skill Tree</em></h1>
  </div>
  <div class="h-right">
    <label style="font-size:10px;color:var(--dm);display:flex;align-items:center;gap:4px">Skill <select id="file-picker" onchange="renderTree()"></select></label>
    <input type="text" id="search" placeholder="Search..." oninput="doSearch(this.value)">
    <button class="btn" onclick="setDepth(99)">Expand</button>
    <button class="btn" onclick="setDepth(1)">Collapse</button>
    <button class="btn btn-theme" onclick="toggleTheme()" id="theme-btn" title="Toggle theme"></button>
  </div>
</header>

<div style="display:flex;justify-content:flex-end;padding:10px 24px 0">
  <div style="text-align:center;font-size:13px;color:var(--tx)">
    <strong style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dm);font-family:system-ui,sans-serif;text-decoration:underline;text-underline-offset:3px;display:block;margin-bottom:2px">Legend</strong>
    <span style="color:var(--ac);text-decoration:underline;text-underline-offset:3px;font-weight:700">Blue underlined</span> = skill file
  </div>
</div>
<div id="tree-panel"></div>



<script>
const DATA=__TREE_JSON__;
let selected=null;
let maxDepth=2;

/* ══ Theme ══ */
function isDark(){return document.documentElement.classList.contains('dark')}
function updateThemeBtn(){document.getElementById('theme-btn').textContent=isDark()?'\u2600':'\u263E'}
function toggleTheme(){
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('altrag-theme',isDark()?'dark':'light');
  updateThemeBtn();
}
updateThemeBtn();

/* ══ File picker ══ */
function initPicker(){
  const sel=document.getElementById('file-picker');
  sel.innerHTML='<option value="all">All files (' + DATA.length + ')</option>';
  DATA.forEach((f,i)=>{const o=document.createElement('option');o.value=i;
    o.textContent=f.path.split('/').pop().split('\\').pop();sel.appendChild(o)});
}

/* ══ Tree ══ */
function renderTree(){
  const tp=document.getElementById('tree-panel');tp.innerHTML='';
  const pick=document.getElementById('file-picker').value;
  const files=pick==='all'?DATA:[DATA[parseInt(pick)]];
  files.forEach(f=>{
    const sec=document.createElement('div');sec.className='file-sec';
    const lbl=document.createElement('div');lbl.className='file-lbl';
    lbl.textContent=f.path.split('/').pop().split('\\').pop();
    sec.appendChild(lbl);
    const vt=document.createElement('ul');vt.className='vt';
    f.tree.forEach(n=>renderNode(vt,n,f.path,1));
    sec.appendChild(vt);tp.appendChild(sec);
  });
  setTimeout(fixBars,0);
}

function renderNode(parent,node,file,depth){
  const li=document.createElement('li');
  li.className='d'+node.d;
  const hasCh=node.ch&&node.ch.length>0;
  const isHR=node.t==='---';
  if(hasCh&&depth>=maxDepth) li.classList.add('shut');
  li.dataset.title=node.t.toLowerCase();li.dataset.depth=depth;

  const nd=document.createElement('div');
  nd.className='node'+(isHR?' hr-n':'');
  const lbl=document.createElement('span');lbl.className='lbl';lbl.textContent=node.t;
  nd.appendChild(lbl);

  nd.onclick=(e)=>{e.stopPropagation();
    if(hasCh){li.classList.toggle('shut');setTimeout(fixBars,0)}
    };

  li.appendChild(nd);
  if(hasCh){const ul=document.createElement('ul');
    node.ch.forEach(c=>renderNode(ul,c,file,depth+1));li.appendChild(ul)}
  parent.appendChild(li);
}

/* ══ Horizontal bars (precise, JS-computed) ══ */
function fixBars(){
  document.querySelectorAll('.hbar').forEach(h=>h.remove());
  document.querySelectorAll('.vt ul').forEach(ul=>{
    const kids=Array.from(ul.children).filter(c=>c.tagName==='LI');
    if(kids.length<2)return;
    const ur=ul.getBoundingClientRect();
    const fc=kids[0].getBoundingClientRect();
    const lc=kids[kids.length-1].getBoundingClientRect();
    const x1=fc.left+fc.width/2-ur.left;
    const x2=lc.left+lc.width/2-ur.left;
    const bar=document.createElement('div');bar.className='hbar';
    bar.style.left=x1+'px';bar.style.width=(x2-x1)+'px';
    bar.style.top=ul.style.paddingTop||'24px';
    ul.style.position='relative';
    ul.appendChild(bar);
  });
}

/* ══ Detail card ══ */
function showDetail(n,file){
  const endLn=n.ln+n.lc-1;const endOff=n.off+n.len;
  const cmd='Read(file="'+file+'", offset='+n.ln+', limit='+n.lc+')';
  const fn=file.split('/').pop().split('\\').pop();
  document.getElementById('dc-title').textContent=n.t;
  document.getElementById('dc-body').innerHTML=
    '<div class="d-row"><span class="l">File</span><span class="v">'+esc(fn)+'</span></div>'+
    '<div class="d-row"><span class="l">Depth</span><span class="v">'+n.d+'</span></div>'+
    '<div class="d-row"><span class="l">Lines</span><span class="v">'+n.ln+'\u2013'+endLn+' ('+n.lc+')</span></div>'+
    '<div class="d-row"><span class="l">Bytes</span><span class="v">'+n.off+'\u2013'+endOff+' ('+n.len+'B)</span></div>'+
    '<div class="d-cmd" onclick="copyCmd(this)"><span class="cp">copy</span>'+esc(cmd)+'</div>';
  document.getElementById('detail-card').classList.add('vis');
}
function closeDetail(){document.getElementById('detail-card').classList.remove('vis')}
function copyCmd(el){
  navigator.clipboard.writeText(el.textContent.replace('copy','').trim());
  el.classList.add('copied');el.querySelector('.cp').textContent='copied!';
  setTimeout(()=>{el.classList.remove('copied');el.querySelector('.cp').textContent='copy'},1500)}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

/* ══ Search ══ */
function doSearch(q){
  q=q.toLowerCase().trim();
  document.querySelectorAll('.vt .node').forEach(nd=>{
    const li=nd.parentElement;
    nd.classList.toggle('sh',q&&li.dataset.title&&li.dataset.title.includes(q));
  });
  if(q){setDepth(99);setTimeout(fixBars,0)}
}
function setDepth(d){
  maxDepth=d;
  document.querySelectorAll('.vt li').forEach(li=>{
    const dep=parseInt(li.dataset.depth)||1;
    const hasCh=li.querySelector(':scope>ul');
    if(!hasCh)return;
    const shut=dep>=d;
    li.classList.toggle('shut',shut);
  });
  setTimeout(fixBars,0);
}


initPicker();renderTree();fixBars();
</script>
</body>
</html>
